<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>📅 Zoomスケジュール</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="ERINA Zoom">
</head>

<body>

    <!-- ヘッダー -->
    <header>

        <h1>📅 Zoomスケジュール</h1>

        <div id="monthTitle">
            2026年7月
        </div>

    </header>

    <!-- 今日のZoom -->
    <section id="todayBox">

        <h2>📢 今日のZoom</h2>

        <div id="todayEvent">
            本日の予定はありません
        </div>

    </section>

    <!-- 次回のZoom -->
    <section id="nextBox">

        <h2>⏭ 次回のZoom</h2>

        <div id="nextEvent">
            次回の予定はありません
        </div>

    </section>

    <!-- 今週の予定 -->
    <section id="weekBox">

        <h2>📅 今週の予定</h2>

        <div id="weekEvents">
            今週の予定はありません
        </div>

    </section>

    <!-- お知らせ -->
    <section id="noticeBox">

        <h2>📢 お知らせ</h2>

        <div id="notice">

            現在お知らせはありません。

        </div>

    </section>

    <!-- カレンダー -->
    <main>

        <div class="calendar">

            <div class="week monday">月</div>
            <div class="week">火</div>
            <div class="week">水</div>
            <div class="week">木</div>
            <div class="week">金</div>
            <div class="week saturday">土</div>
            <div class="week sunday">日</div>

            <div id="calendarBody"></div>

        </div>

    </main>

    <script src="events.js"></script>
    <script src="calendar.js"></script>
    <script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("./service-worker.js")

            .then(() => {

                console.log("Service Worker 登録完了");

            })

            .catch(error => {

                console.log("Service Worker エラー", error);

            });

    });

}

</script>

</body>

</html>
